[env:spm-enhanced]
platform = espressif32
board = esp32dev
framework = arduino
board_build.partitions = min_spiffs.csv

build_flags = 
  -DCORE_DEBUG_LEVEL=1
  -DARDUINO_USB_CDC_ON_BOOT=0

lib_deps =
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^6.21.0

monitor_speed = 115200
upload_speed = 460800
